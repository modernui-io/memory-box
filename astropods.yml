# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: package/v1
name: memory-box
meta:
  visibility: public
agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    frontend: true
    messaging: false
models:
  anthropic:
    provider: anthropic

knowledge:
  db:
    provider: postgres
    persistent: true
    inputs:
      - name: POSTGRES_DB
        datatype: string
        default: memory_box
  files:
    container:
      build:
        context: .
        dockerfile: minio.Dockerfile
      port: 9000
      volume: /data
    persistent: true
  embeddings:
    container:
      image: mindthemath/nomic-embed-v1.5:slim
      port: 8080

dev:
  interfaces:
    frontend:
      port: 3001
